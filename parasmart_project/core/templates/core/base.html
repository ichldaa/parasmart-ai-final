<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ParaSmart AI{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #5bbccc;
            --primary-dark: #4aa8b8;
            --primary-light: #e8f7fa;
            --sidebar-w: 220px;
            --text-dark: #2d3748;
            --text-muted: #718096;
            --bg-main: #f5f7fa;
            --white: #ffffff;
            --border: #e2e8f0;
            --shadow: 0 2px 12px rgba(0,0,0,0.07);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-dark); }

        /* ── SIDEBAR ── */
        .sidebar {
            position: fixed; top: 0; left: 0;
            width: var(--sidebar-w); height: 100vh;
            background: var(--primary);
            display: flex; flex-direction: column;
            z-index: 100; overflow: hidden;
        }
        .sidebar-brand {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            padding: 22px 20px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .brand-icon {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .brand-icon i { color: #fff; font-size: 16px; }
        .brand-name { color: #fff; font-weight: 700; font-size: 15px; line-height: 1.2; }

        .sidebar-nav { flex: 1; padding: 14px 0; }
        .nav-item { display: flex; align-items: center; gap: 12px;
            padding: 11px 22px; color: rgba(255,255,255,0.85);
            text-decoration: none; font-size: 14px; font-weight: 500;
            transition: all .2s; cursor: pointer; border: none; background: none; width: 100%;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.2);
            color: #fff; border-radius: 0;
        }
        .nav-item.active { font-weight: 600; }
        .nav-item i { font-size: 16px; width: 18px; text-align: center; }

        /* ── TOPBAR ── */
        .topbar {
            position: fixed; top: 0;
            left: var(--sidebar-w); right: 0;
            height: 58px; background: var(--white);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 28px; z-index: 99;
            box-shadow: var(--shadow);
        }
        .topbar-title { display: flex; align-items: center; gap: 8px;
            font-size: 15px; color: var(--text-muted); font-weight: 500;
        }
        .topbar-title i { color: var(--primary); }
        .topbar-user {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--primary-light); border: 2px solid var(--primary);
            display: flex; align-items: center; justify-content: center;
            color: var(--primary); font-size: 16px; cursor: pointer;
        }

        /* ── MAIN CONTENT ── */
        .main-content {
            margin-left: var(--sidebar-w);
            margin-top: 58px;
            padding: 28px;
            min-height: calc(100vh - 58px);
        }

        /* ── CARDS ── */
        .card-feature {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 22px;
            box-shadow: var(--shadow);
            transition: box-shadow .2s;
        }
        .card-feature:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .card-feature h5 { font-weight: 700; font-size: 15px; color: var(--text-dark); margin-bottom: 6px; }
        .card-feature p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

        .btn-primary-custom {
            background: var(--primary); color: #fff;
            border: none; border-radius: 8px;
            padding: 8px 20px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: background .2s;
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-primary-custom:hover { background: var(--primary-dark); color: #fff; }

        .btn-outline-custom {
            background: transparent; color: var(--primary);
            border: 1.5px solid var(--primary); border-radius: 8px;
            padding: 7px 18px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all .2s;
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-outline-custom:hover { background: var(--primary); color: #fff; }

        /* ── PAGE HEADER ── */
        .page-header { margin-bottom: 22px; }
        .page-header h2 { font-size: 22px; font-weight: 700; color: var(--text-dark); }

        /* ── TEXTAREA ── */
        .custom-textarea {
            width: 100%; border: 1.5px solid var(--border);
            border-radius: 10px; padding: 14px;
            font-size: 14px; color: var(--text-dark);
            resize: vertical; outline: none; transition: border .2s;
            font-family: inherit;
        }
        .custom-textarea:focus { border-color: var(--primary); }

        /* ── FORM CONTROLS ── */
        .custom-select {
            border: 1.5px solid var(--border); border-radius: 8px;
            padding: 8px 14px; font-size: 14px; outline: none;
            transition: border .2s; background: var(--white);
        }
        .custom-select:focus { border-color: var(--primary); }

        /* ── RESULT CARD ── */
        .result-card {
            background: var(--white); border: 1.5px solid var(--border);
            border-radius: 12px; padding: 20px;
            box-shadow: var(--shadow);
        }
        .result-card h6 { font-weight: 700; color: var(--text-dark); margin-bottom: 8px; }

        /* ── LOADING SPINNER ── */
        .spinner-custom {
            display: inline-block; width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff; border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── TABLE ── */
        .table-custom { width: 100%; border-collapse: collapse; }
        .table-custom th {
            background: var(--primary-light); color: var(--primary-dark);
            font-size: 13px; font-weight: 600; padding: 12px 16px;
            text-align: left; border-bottom: 2px solid var(--border);
        }
        .table-custom td {
            padding: 12px 16px; font-size: 13px; color: var(--text-dark);
            border-bottom: 1px solid var(--border); vertical-align: middle;
        }
        .table-custom tr:hover td { background: var(--primary-light); }

        /* ── ALERTS ── */
        .alert-custom {
            padding: 10px 16px; border-radius: 8px;
            font-size: 13px; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .alert-error { background: #fff5f5; border: 1px solid #fed7d7; color: #c53030; }
        .alert-success { background: #f0fff4; border: 1px solid #c6f6d5; color: #276749; }
        .alert-info { background: var(--primary-light); border: 1px solid var(--primary); color: var(--primary-dark); }

        /* ── PROGRESS BAR ── */
        .progress-bar-wrap {
            background: #e2e8f0; border-radius: 50px;
            height: 14px; overflow: hidden; margin: 8px 0;
        }
        .progress-bar-fill {
            height: 100%; border-radius: 50px;
            transition: width 1s ease; display: flex; align-items: center;
            justify-content: center;
        }
        .progress-label { font-size: 11px; font-weight: 700; color: #fff; }

        /* ── UPLOAD BOX ── */
        .upload-box {
            border: 2px dashed var(--primary);
            border-radius: 14px; background: var(--primary-light);
            padding: 50px 20px; text-align: center;
            cursor: pointer; transition: all .2s;
        }
        .upload-box:hover { background: #d4eff5; }
        .upload-box.dragover { background: #b8e8f2; border-color: var(--primary-dark); }
        .upload-box i { font-size: 40px; color: var(--primary); margin-bottom: 12px; display: block; }
        .upload-box p { color: var(--text-muted); font-size: 14px; margin: 0; }
        .upload-box .upload-link { color: var(--primary); font-weight: 600; cursor: pointer; }

        /* ── STAT BADGE ── */
        .stat-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--primary-light); color: var(--primary-dark);
            border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            :root { --sidebar-w: 0px; }
            .sidebar { transform: translateX(-220px); transition: transform .3s; width: 220px; }
            .sidebar.open { transform: translateX(0); }
            .topbar { left: 0; }
            .main-content { margin-left: 0; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
